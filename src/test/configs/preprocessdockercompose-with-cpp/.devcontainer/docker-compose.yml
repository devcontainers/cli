version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.in
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
  db:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data: null
